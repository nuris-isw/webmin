                  data:
                    type: array
                    example:
                      -
                        id: 1
                        nama_sekolah: 'SMK Mandiri'
                        slug: smk-mandiri
                        jenjang: smk
                        is_active: true
                        logo_sekolah: 'http://localhost/storage/1/logo.png'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        nama_sekolah:
                          type: string
                          example: 'SMK Mandiri'
                        slug:
                          type: string
                          example: smk-mandiri
                        jenjang:
                          type: string
                          example: smk
                        is_active:
                          type: boolean
                          example: true
                        logo_sekolah:
                          type: string
                          example: 'http://localhost/storage/1/logo.png'
