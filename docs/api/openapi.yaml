                      informasi_prosedur:
                        type: string
                        example: 'Berikut adalah prosedur pendaftaran...'
                      url_eksternal_pendaftaran:
                        type: string
                        example: 'https://ppdb.example.com'
      tags:
        - SPMB
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
  /api/v1/units:
    get:
      summary: 'Get active units.'
