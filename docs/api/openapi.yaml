                  data:
                    id: 1
                    nama_jurusan: 'Teknik Komputer dan Jaringan'
                    nomenklatur_istilah: 'Teknik Komputer dan Jaringan'
                    shortname: TKJ
                    nama_kaprog: 'Pak Budi'
