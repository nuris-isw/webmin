                        type: string
                        example: 'Teknik Komputer dan Jaringan'
                      nomenklatur_istilah:
                        type: string
                        example: 'Teknik Komputer dan Jaringan'
                      shortname:
                        type: string
                        example: TKJ
                      nama_kaprog:
                        type: string
                        example: 'Pak Budi'
                      foto_kaprog:
                        type: string
                        example: 'http://localhost/storage/1/kaprog.png'
                      deskripsi_jurusan:
                        type: string
                        example: 'Deskripsi TKJ...'
                      galeri_program:
                        type: array
                        example: []
      tags:
        - Majors
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
