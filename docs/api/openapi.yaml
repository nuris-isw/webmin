openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Achievements
    description: "\nAPI for querying school achievements."
  -
    name: Extracurriculars
    description: "\nAPI for querying school extracurricular organizations and clubs."
  -
    name: Galleries
    description: "\nAPI for querying school activity galleries and multimedia banner content."
  -
    name: Majors
    description: "\nAPI for querying SMK majors/competencies. Note: Only available for units of type 'smk'."
  -
    name: News
    description: "\nAPI for querying news and articles from school units."
  -
    name: SPMB
    description: "\nAPI for querying school enrollment (SPMB) settings and status."
  -
    name: Units
    description: "\nAPI for managing and querying school units."
paths:
  '/api/v1/units/{slug}/achievements':
    get:
      summary: 'Get achievements.'
      operationId: getAchievements
      description: 'Returns a list of achievements for the specified school unit.'
      parameters:
        -
          in: query
          name: peraih
          description: 'Filter achievements by recipient role: `siswa`, `guru`, `tendik`, or `sekolah`.'
          example: siswa
          required: false
          schema:
            type: string
            description: 'Filter achievements by recipient role: `siswa`, `guru`, `tendik`, or `sekolah`.'
            example: siswa
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Daftar prestasi berhasil diambil.'
                  data:
                    -
                      id: 1
                      judul_prestasi: 'Juara 1 Lomba LKS SMK'
                      tahun_prestasi: 2026
                      peraih_prestasi: siswa
                      deskripsi_prestasi: 'Juara 1 Bidang IT Network Systems Administration.'
                      foto_penghargaan: 'http://localhost/storage/1/ach.png'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Daftar prestasi berhasil diambil.'
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        judul_prestasi: 'Juara 1 Lomba LKS SMK'
                        tahun_prestasi: 2026
                        peraih_prestasi: siswa
                        deskripsi_prestasi: 'Juara 1 Bidang IT Network Systems Administration.'
                        foto_penghargaan: 'http://localhost/storage/1/ach.png'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        judul_prestasi:
                          type: string
                          example: 'Juara 1 Lomba LKS SMK'
                        tahun_prestasi:
                          type: integer
                          example: 2026
                        peraih_prestasi:
                          type: string
                          example: siswa
                        deskripsi_prestasi:
                          type: string
                          example: 'Juara 1 Bidang IT Network Systems Administration.'
                        foto_penghargaan:
                          type: string
                          example: 'http://localhost/storage/1/ach.png'
      tags:
        - Achievements
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
  '/api/v1/units/{slug}/extracurriculars':
    get:
      summary: 'Get extracurriculars.'
      operationId: getExtracurriculars
      description: 'Returns a list of extracurriculars for the specified school unit.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Daftar ekstrakurikuler berhasil diambil.'
                  data:
                    -
                      id: 1
                      nama_ekskul: Pramuka
                      pembina_ekskul: 'Kak Ahmad'
                      jadwal_kegiatan: 'Sabtu 08:00 - 11:00'
                      logo_ekskul: 'http://localhost/storage/1/ekskul.png'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Daftar ekstrakurikuler berhasil diambil.'
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        nama_ekskul: Pramuka
                        pembina_ekskul: 'Kak Ahmad'
                        jadwal_kegiatan: 'Sabtu 08:00 - 11:00'
                        logo_ekskul: 'http://localhost/storage/1/ekskul.png'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        nama_ekskul:
                          type: string
                          example: Pramuka
                        pembina_ekskul:
                          type: string
                          example: 'Kak Ahmad'
                        jadwal_kegiatan:
                          type: string
                          example: 'Sabtu 08:00 - 11:00'
                        logo_ekskul:
                          type: string
                          example: 'http://localhost/storage/1/ekskul.png'
      tags:
        - Extracurriculars
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
  '/api/v1/units/{slug}/galleries':
    get:
      summary: 'Get galleries.'
      operationId: getGalleries
      description: 'Returns a list of galleries for the specified school unit.'
      parameters:
        -
          in: query
          name: opsi_tampilan
          description: 'Filter galleries by display option: `hero_section`, `gambar_pembuka`, `galeri_dokumentasi`, or `galeri_program`.'
          example: galeri_dokumentasi
          required: false
          schema:
            type: string
            description: 'Filter galleries by display option: `hero_section`, `gambar_pembuka`, `galeri_dokumentasi`, or `galeri_program`.'
            example: galeri_dokumentasi
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Daftar galeri berhasil diambil.'
                  data:
                    -
                      id: 1
                      nama_kegiatan: 'LDKS OSIS 2026'
                      opsi_tampilan: galeri_dokumentasi
                      major_id: null
                      photos:
                        -
                          id: 1
                          file_foto: 'http://localhost/storage/1/ldks.png'
                          urutan: 1
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Daftar galeri berhasil diambil.'
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        nama_kegiatan: 'LDKS OSIS 2026'
                        opsi_tampilan: galeri_dokumentasi
                        major_id: null
                        photos:
                          -
                            id: 1
                            file_foto: 'http://localhost/storage/1/ldks.png'
                            urutan: 1
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        nama_kegiatan:
                          type: string
                          example: 'LDKS OSIS 2026'
                        opsi_tampilan:
                          type: string
                          example: galeri_dokumentasi
                        major_id:
                          type: string
                          example: null
                          nullable: true
                        photos:
                          type: array
                          example:
                            -
                              id: 1
                              file_foto: 'http://localhost/storage/1/ldks.png'
                              urutan: 1
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              file_foto:
                                type: string
                                example: 'http://localhost/storage/1/ldks.png'
                              urutan:
                                type: integer
                                example: 1
      tags:
        - Galleries
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
  '/api/v1/units/{slug}/galleries/{id}':
    get:
      summary: 'Get gallery details.'
      operationId: getGalleryDetails
      description: 'Returns a specific gallery details along with all associated photos.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Detail galeri berhasil diambil.'
                  data:
                    id: 1
                    nama_kegiatan: 'LDKS OSIS 2026'
                    opsi_tampilan: galeri_dokumentasi
                    major_id: null
                    photos:
                      -
                        id: 1
                        file_foto: 'http://localhost/storage/1/ldks.png'
                        urutan: 1
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Detail galeri berhasil diambil.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nama_kegiatan:
                        type: string
                        example: 'LDKS OSIS 2026'
                      opsi_tampilan:
                        type: string
                        example: galeri_dokumentasi
                      major_id:
                        type: string
                        example: null
                        nullable: true
                      photos:
                        type: array
                        example:
                          -
                            id: 1
                            file_foto: 'http://localhost/storage/1/ldks.png'
                            urutan: 1
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            file_foto:
                              type: string
                              example: 'http://localhost/storage/1/ldks.png'
                            urutan:
                              type: integer
                              example: 1
      tags:
        - Galleries
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
      -
        in: path
        name: id
        description: 'The ID of the gallery.'
        example: 1
        required: true
        schema:
          type: integer
  '/api/v1/units/{slug}/majors':
    get:
      summary: 'Get majors list.'
      operationId: getMajorsList
