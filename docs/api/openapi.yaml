          type: string
      -
        in: path
        name: id
        description: 'The ID of the major.'
        example: 1
        required: true
        schema:
          type: integer
  '/api/v1/units/{slug}/news':
    get:
      summary: 'Get news listing.'
      operationId: getNewsListing
      description: 'Returns a paginated list of published news articles for the specified unit.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Number of articles per page. Default: 10.'
          example: 10
          required: false
          schema:
            type: integer
            description: 'Number of articles per page. Default: 10.'
            example: 10
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Daftar berita berhasil diambil.'
                  data:
                    -
                      id: 1
                      judul_berita: 'Pendaftaran Siswa Baru'
                      slug: pendaftaran-siswa-baru
                      konten_berita: Pendaftaran...
                      gambar_utama: 'http://localhost/storage/1/news.png'
                      published_at: '2026-06-11T12:00:00Z'
                  meta:
                    current_page: 1
                    from: 1
                    last_page: 1
                    per_page: 10
                    to: 1
                    total: 1
                  links:
                    first: 'http://localhost/api/v1/units/smk-mandiri/news?page=1'
                    last: 'http://localhost/api/v1/units/smk-mandiri/news?page=1'
                    prev: null
                    next: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Daftar berita berhasil diambil.'
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        judul_berita: 'Pendaftaran Siswa Baru'
                        slug: pendaftaran-siswa-baru
                        konten_berita: Pendaftaran...
                        gambar_utama: 'http://localhost/storage/1/news.png'
                        published_at: '2026-06-11T12:00:00Z'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        judul_berita:
                          type: string
                          example: 'Pendaftaran Siswa Baru'
                        slug:
                          type: string
                          example: pendaftaran-siswa-baru
                        konten_berita:
                          type: string
                          example: Pendaftaran...
                        gambar_utama:
                          type: string
                          example: 'http://localhost/storage/1/news.png'
                        published_at:
                          type: string
                          example: '2026-06-11T12:00:00Z'
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      from:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 10
                      to:
                        type: integer
                        example: 1
                      total:
                        type: integer
                        example: 1
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: 'http://localhost/api/v1/units/smk-mandiri/news?page=1'
                      last:
                        type: string
                        example: 'http://localhost/api/v1/units/smk-mandiri/news?page=1'
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
      tags:
        - News
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
  '/api/v1/units/{slug}/news/{newsSlug}':
    get:
      summary: 'Get news detail.'
      operationId: getNewsDetail
      description: 'Returns a specific published news article by its slug.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Detail berita berhasil diambil.'
                  data:
                    id: 1
                    judul_berita: 'Pendaftaran Siswa Baru'
                    slug: pendaftaran-siswa-baru
                    konten_berita: Pendaftaran...
                    gambar_utama: 'http://localhost/storage/1/news.png'
                    published_at: '2026-06-11T12:00:00Z'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Detail berita berhasil diambil.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      judul_berita:
                        type: string
                        example: 'Pendaftaran Siswa Baru'
                      slug:
                        type: string
                        example: pendaftaran-siswa-baru
                      konten_berita:
                        type: string
                        example: Pendaftaran...
                      gambar_utama:
                        type: string
                        example: 'http://localhost/storage/1/news.png'
                      published_at:
                        type: string
                        example: '2026-06-11T12:00:00Z'
      tags:
        - News
      security: []
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the school unit.'
        example: smk-mandiri
        required: true
        schema:
          type: string
      -
        in: path
        name: newsSlug
        description: 'The slug of the news article.'
        example: pendaftaran-siswa-baru
        required: true
        schema:
          type: string
  '/api/v1/units/{slug}/spmb':
    get:
      summary: 'Get SPMB settings.'
      operationId: getSPMBSettings
      description: 'Returns the SPMB settings of the specified school unit.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Pengaturan SPMB berhasil diambil.'
                  data:
                    id: 1
