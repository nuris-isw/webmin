                  data:
                    -
                      id: 1
                      nama_jurusan: 'Teknik Komputer dan Jaringan'
                      nomenklatur_istilah: 'Teknik Komputer dan Jaringan'
                      shortname: TKJ
                      nama_kaprog: 'Pak Budi'
                      foto_kaprog: 'http://localhost/storage/1/kaprog.png'
                      deskripsi_jurusan: 'Deskripsi TKJ...'
                      galeri_program: []
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Daftar jurusan berhasil diambil.'
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        nama_jurusan: 'Teknik Komputer dan Jaringan'
                        nomenklatur_istilah: 'Teknik Komputer dan Jaringan'
                        shortname: TKJ
                        nama_kaprog: 'Pak Budi'
                        foto_kaprog: 'http://localhost/storage/1/kaprog.png'
                        deskripsi_jurusan: 'Deskripsi TKJ...'
                        galeri_program: []
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        nama_jurusan:
                          type: string
                          example: 'Teknik Komputer dan Jaringan'
                        nomenklatur_istilah:
                          type: string
                          example: 'Teknik Komputer dan Jaringan'
                        shortname:
                          type: string
                          example: TKJ
                        nama_kaprog:
                          type: string
                          example: 'Pak Budi'
                        foto_kaprog:
                          type: string
                          example: 'http://localhost/storage/1/kaprog.png'
                        deskripsi_jurusan:
                          type: string
                          example: 'Deskripsi TKJ...'
                        galeri_program:
                          type: array
                          example: []
