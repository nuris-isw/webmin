        - Units
      security: []
  '/api/v1/units/{slug}':
    get:
      summary: 'Get unit details.'
      operationId: getUnitDetails
      description: 'Returns the full school profile of the specified unit slug.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Detail unit sekolah berhasil diambil.'
                  data:
                    id: 1
                    nama_sekolah: 'SMK Mandiri'
                    slug: smk-mandiri
                    jenjang: smk
                    is_active: true
                    logo_sekolah: 'http://localhost/storage/1/logo.png'
                    profile:
                      id: 1
                      unit_id: 1
                      logo_sekolah: 'http://localhost/storage/1/logo.png'
                      email: smk@mandiri.sch.id
                      telepon: 021-123456
                      alamat: 'Jl. Mandiri No. 1'
                      google_map_embed_url: 'https://maps...'
                      media_sosial:
                        facebook: 'https://...'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Detail unit sekolah berhasil diambil.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nama_sekolah:
                        type: string
                        example: 'SMK Mandiri'
                      slug:
                        type: string
                        example: smk-mandiri
                      jenjang:
                        type: string
                        example: smk
                      is_active:
                        type: boolean
                        example: true
